services:
  mysql:
    image: mysql:8.4
    container_name: ims-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ims
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: ims_user
      MYSQL_PASSWORD: ims_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: ims-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ims_user
      DB_PASSWORD: ims_password
      DB_NAME: ims
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ./backend/storage/pdfs:/app/storage/pdfs

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: ims-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data:
